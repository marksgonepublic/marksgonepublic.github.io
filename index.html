<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Teasdale - Property Management, Vancouver</title>
    <meta name="description" content="Mark Teasdale - Property Management professional in Vancouver, BC. Managing furnished and unfurnished rental properties across Greater Vancouver.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Star particles background */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4px 24px 0;
            width: 100%;
        }

        /* Fade-in animations */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            opacity: 0;
            animation: fadeSlideDown 0.8s ease-out 0.2s forwards;
        }

        .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeSlideDown 0.8s ease-out 0.5s forwards;
        }

        .location {
            font-size: 14px;
            color: #555;
            margin-bottom: -10px;
            opacity: 0;
            animation: fadeSlideDown 0.8s ease-out 0.7s forwards;
        }

        .globe-wrapper {
            position: relative;
            width: min(1200px, 95vw);
            height: min(1200px, 95vw);
            margin: -100px auto 0;
            cursor: grab;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.3s forwards;
        }

        .globe-wrapper:active {
            cursor: grabbing;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* Pulsing marker glow */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px 2px rgba(192, 57, 43, 0.6); }
            50% { box-shadow: 0 0 20px 8px rgba(192, 57, 43, 0.9); }
        }

        #marker-hit {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            display: none;
            animation: pulse 2s ease-in-out infinite;
        }

        #marker-hit:hover::after {
            content: 'uniqueaccommodations.com';
            position: absolute;
            top: -36px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(192, 57, 43, 0.95);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .globe-wrapper {
                width: 98vw;
                height: 98vw;
            }

            h1 { font-size: 28px; }
            .container { padding: 16px 12px 0; }
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <div class="container">
        <h1>Mark Teasdale</h1>
        <p class="subtitle">Building AI-Powered Property Management Software</p>
        <p class="location">Vancouver, BC</p>

        <div class="globe-wrapper">
            <canvas id="globe" width="2400" height="2400"></canvas>
            <div id="marker-hit"></div>
        </div>
    </div>

    <script src="cobe.bundle.js"></script>
    <script>
        // ---- Star particles ----
        (function () {
            var starsCanvas = document.getElementById("stars");
            var ctx = starsCanvas.getContext("2d");
            var stars = [];
            var numStars = 120;

            function resize() {
                starsCanvas.width = window.innerWidth;
                starsCanvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            for (var i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    dx: (Math.random() - 0.5) * 0.15,
                    dy: (Math.random() - 0.5) * 0.1,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }

            function drawStars() {
                requestAnimationFrame(drawStars);
                ctx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);

                for (var i = 0; i < stars.length; i++) {
                    var s = stars[i];
                    s.x += s.dx;
                    s.y += s.dy;
                    s.twinklePhase += s.twinkleSpeed;

                    if (s.x < 0) s.x = starsCanvas.width;
                    if (s.x > starsCanvas.width) s.x = 0;
                    if (s.y < 0) s.y = starsCanvas.height;
                    if (s.y > starsCanvas.height) s.y = 0;

                    var a = s.alpha + Math.sin(s.twinklePhase) * 0.2;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 255, 255, " + Math.max(0, a) + ")";
                    ctx.fill();
                }
            }
            requestAnimationFrame(drawStars);
        })();

        // ---- Globe ----
        var _globePhi = 0;
        var _globeReady = false;

        var canvas = document.getElementById("globe");
        var markerHit = document.getElementById("marker-hit");
        var wrapper = document.querySelector(".globe-wrapper");
        var phi = 0;
        var pointerDown = false;
        var pointerX = 0;
        var pointerStartX = 0;
        var velocityX = 0;

        createGlobe(canvas, {
            devicePixelRatio: 2,
            width: 2400,
            height: 2400,
            phi: 0,
            theta: 0.3,
            dark: 1,
            diffuse: 1.2,
            mapSamples: 20000,
            mapBrightness: 6,
            baseColor: [0.3, 0.3, 0.3],
            markerColor: [0.75, 0.22, 0.17],
            glowColor: [0.08, 0.08, 0.08],
            markers: [
                { location: [49.28, -123.12], size: 0.1 }
            ],
            onRender: function (state) {
                if (!pointerDown) {
                    phi += 0.003;
                }
                phi += velocityX;
                velocityX *= 0.95;
                state.phi = phi;
                _globePhi = phi;
                _globeReady = true;
            }
        });

        // ---- Marker overlay projection ----
        var latRad = 49.28 * Math.PI / 180;
        var lngAdj = -123.12 * Math.PI / 180 - Math.PI;
        var mx = -Math.cos(latRad) * Math.cos(lngAdj);
        var my = Math.sin(latRad);
        var mz = Math.cos(latRad) * Math.sin(lngAdj);
        var theta = 0.3;

        function positionMarker() {
            requestAnimationFrame(positionMarker);
            if (!_globeReady) return;

            var p = _globePhi;
            var cp = Math.cos(p), sp = Math.sin(p);
            var ct = Math.cos(theta), st = Math.sin(theta);

            var camX = cp * mx + sp * mz;
            var camY = sp * st * mx + ct * my - cp * st * mz;
            var camZ = -sp * ct * mx + st * my + cp * ct * mz;

            if (camZ > 0.05) {
                var w = canvas.clientWidth;
                var sx = w * (camX * 0.8 + 1) / 2;
                var sy = w * (1 - camY * 0.8) / 2;
                markerHit.style.display = "block";
                markerHit.style.left = sx + "px";
                markerHit.style.top = sy + "px";
            } else {
                markerHit.style.display = "none";
            }
        }
        requestAnimationFrame(positionMarker);

        // Click handler for marker
        markerHit.addEventListener("click", function (e) {
            e.stopPropagation();
            window.open("https://www.uniqueaccommodations.com", "_blank");
        });

        // Drag interaction
        wrapper.addEventListener("pointerdown", function (e) {
            if (e.target === markerHit) return;
            pointerDown = true;
            pointerX = e.clientX;
            pointerStartX = e.clientX;
            wrapper.style.cursor = "grabbing";
        });

        window.addEventListener("pointerup", function () {
            pointerDown = false;
            wrapper.style.cursor = "grab";
        });

        window.addEventListener("pointermove", function (e) {
            if (pointerDown) {
                var dx = e.clientX - pointerX;
                pointerX = e.clientX;
                velocityX = dx / 200;
            }
        });

        canvas.addEventListener("touchstart", function (e) {
            if (e.touches.length === 1) {
                pointerDown = true;
                pointerX = e.touches[0].clientX;
                pointerStartX = e.touches[0].clientX;
            }
        }, { passive: true });

        window.addEventListener("touchend", function () {
            pointerDown = false;
        });

        window.addEventListener("touchmove", function (e) {
            if (pointerDown && e.touches.length === 1) {
                var dx = e.touches[0].clientX - pointerX;
                pointerX = e.touches[0].clientX;
                velocityX = dx / 200;
            }
        }, { passive: true });
    </script>
</body>
</html>
