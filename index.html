        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 4px 24px 0;

        }

        /* Fade-in animations */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            opacity: 0;

            cursor: default;
            transition: text-shadow 0.3s ease;
            position: relative;
            z-index: 5;
        }

        h1:hover {
            text-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeSlideDown 0.8s ease-out 0.5s forwards;
            position: relative;
            z-index: 5;
        }

        .location {
            font-size: 14px;
            color: #555;
            margin-bottom: -10px;
            opacity: 0;
            animation: fadeSlideDown 0.8s ease-out 0.7s forwards;
            position: relative;
            z-index: 5;
        }

        .globe-wrapper {
            position: relative;
            width: min(1200px, 95vw);
            height: min(1200px, 95vw);
            margin: -100px auto 0;
            cursor: grab;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.3s forwards;
        }

        .globe-wrapper:active {
            cursor: grabbing;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px 4px rgba(192, 57, 43, 0.2); }
            50% { box-shadow: 0 0 18px 8px rgba(192, 57, 43, 0.4); }
        }

        #marker-hit {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            display: none;
            animation: pulse 2s ease-in-out infinite;
        }

        #marker-hit:hover::after {
            content: 'Chat with Mark';
            position: absolute;
            top: -36px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(192, 57, 43, 0.95);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;

        #teleport {

            border-radius: 50%;

            z-index: 9999;

        #chat-send:hover { background: #e74c3c; }
        #chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
        /* Transmission overlay */
        #transmission-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);

        }
        .transmission-text {
            font-size: 28px;

            text-shadow: 0 0 30px rgba(192, 57, 43, 0.5);
        }
        .transmission-sub {
            font-size: 14px;
            color: #888;
            margin-top: 8px;
        }
        @keyframes transmissionFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Marker tooltip in chat mode */
        body.chat-mode #marker-hit:hover::after {
            content: 'Chat with AI Mark';
        }
        @media (max-width: 640px) {
            #chat-messages { max-height: 200px; }
            .chat-msg { max-width: 90%; font-size: 13px; }
            .transmission-text { font-size: 22px; letter-spacing: 2px; }
        }
    </style>

    <script>
        // ---- Star particles ----
        (function () {
            var starsCanvas = document.getElementById("stars");
            var ctx = starsCanvas.getContext("2d");
            var stars = [];
            var numStars = 120;

            function resize() {
                starsCanvas.width = window.innerWidth;
                starsCanvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            for (var i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    dx: (Math.random() - 0.5) * 0.15,
                    dy: (Math.random() - 0.5) * 0.1,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }

            // Floating tech words
            var techWords = [
                // AI Models & Platforms
                "Claude", "OpenAI", "GPT-4", "GPT-5", "ChatGPT", "Anthropic",
                "Gemini", "Llama 3", "Mistral", "Ollama", "Copilot", "Perplexity",
                "Midjourney", "DALL-E", "Stable Diffusion", "Sora", "Whisper",
                // AI Concepts
                "LLM", "RAG", "Embeddings", "NLP", "Machine Learning",
                "Neural Networks", "Deep Learning", "Transformers", "BERT",
                "Fine-Tuning", "LoRA", "Inference", "Tokenizer", "Attention",
                "Prompt Engineering", "AI Agents", "Multi-Modal", "Diffusion",
                "Reinforcement Learning", "Computer Vision", "Semantic Search",
                "Vector DB", "Knowledge Graph", "Edge AI", "MLOps",
                "Generative AI", "Foundation Models", "Chain of Thought",
                // Frameworks & Tools
                "Langchain", "LlamaIndex", "Hugging Face", "TensorFlow",
                "PyTorch", "Keras", "scikit-learn", "Pandas", "NumPy",
                // Languages & Runtimes
                "Python", "JavaScript", "TypeScript", "Node.js", "VBA", "SQL",
                // Web & Cloud
                "Next.js", "React", "Supabase", "PostgreSQL", "Flask",
                "Vercel", "Tailwind", "WebGL", "GraphQL", "REST API",
                "WebSockets", "OAuth", "Redis", "MongoDB",
                "AWS", "Azure", "Docker", "Kubernetes", "CI/CD", "GitHub",
                // Mark's Stack
                "Twilio", "Graph API", "OCR", "Tesseract", "PaddleOCR",
                "SMTP", "Cron Jobs", "Data Pipeline", "API", "Automation",
                // Trending 2026
                "MCP", "Tool Use", "Agentic AI", "Claude Code",
                "Cursor", "Windsurf", "v0", "Bolt", "Lovable",
                "OpenRouter", "Groq", "Cerebras", "Local LLM",
                "Context Window", "System Prompt", "Function Calling",
                "Structured Output", "Streaming", "Batch API",
                "AI Safety", "Alignment", "RLHF", "DPO",
                "Retrieval", "Chunking", "Reranking", "Hybrid Search"
            ];
            var floatingWords = [];
            var isMobile = window.innerWidth < 640;
            var wordCount = isMobile ? Math.min(30, techWords.length) : techWords.length;
            // Shuffle on mobile to get variety
            if (isMobile) techWords.sort(function () { return Math.random() - 0.5; });
            for (var w = 0; w < wordCount; w++) {
                floatingWords.push({
                    text: techWords[w],
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * (starsCanvas.height - 150) + 150,
                    dx: (Math.random() - 0.5) * 0.06,
                    dy: (Math.random() - 0.5) * 0.06,
                    alpha: 0.20,
                    size: isMobile ? Math.random() * 3 + 8 : Math.random() * 4 + 10
                });
            }
            var nameHovered = false;
            var wasHovered = false;
            var headerArea = document.querySelector(".container");
            // Tap to toggle on mobile
            document.querySelector("h1").addEventListener("click", function () {
                nameHovered = !nameHovered;
                if (nameHovered) {
                    for (var r = 0; r < floatingWords.length; r++) {
                        floatingWords[r].x = Math.random() * starsCanvas.width;
                        floatingWords[r].y = Math.random() * (starsCanvas.height - 150) + 150;
                        floatingWords[r]._currentAlpha = 0;
                    }
                }
            });
            headerArea.addEventListener("mouseover", function (e) {
                var rect = headerArea.getBoundingClientRect();
                if (e.clientY < rect.top + 110) nameHovered = true;
            });
            headerArea.addEventListener("mouseout", function () { nameHovered = false; });
            headerArea.addEventListener("mousemove", function (e) {
                var rect = headerArea.getBoundingClientRect();
                nameHovered = e.clientY < rect.top + 110;
                if (nameHovered && !wasHovered) {
                    for (var r = 0; r < floatingWords.length; r++) {
                        floatingWords[r].x = Math.random() * starsCanvas.width;
                        floatingWords[r].y = Math.random() * (starsCanvas.height - 150) + 150;
                        floatingWords[r]._currentAlpha = 0;
                    }
                }
                wasHovered = nameHovered;
            });

            // Shooting stars
            var shootingStars = [];
            function spawnShootingStar() {
                shootingStars.push({
                    x: Math.random() * starsCanvas.width * 0.8,
                    y: Math.random() * starsCanvas.height * 0.4,
                    len: Math.random() * 80 + 40,
                    speed: Math.random() * 8 + 6,
                    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.01
                });
                setTimeout(spawnShootingStar, Math.random() * 6000 + 3000);
            }
            setTimeout(spawnShootingStar, 2000);

            // Spaceships
            var ships = [];
            for (var j = 0; j < 3; j++) {
                ships.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height * 0.6,
                    angle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.4 + 0.3,
                    turnSpeed: (Math.random() - 0.5) * 0.005,
                    size: Math.random() * 2 + 2,
                    trail: []
                });
            }

            function drawStars() {
                requestAnimationFrame(drawStars);
                ctx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);

                // Stars
                for (var i = 0; i < stars.length; i++) {
                    var s = stars[i];
                    s.x += s.dx;
                    s.y += s.dy;
                    s.twinklePhase += s.twinkleSpeed;

                    if (s.x < 0) s.x = starsCanvas.width;
                    if (s.x > starsCanvas.width) s.x = 0;
                    if (s.y < 0) s.y = starsCanvas.height;
                    if (s.y > starsCanvas.height) s.y = 0;

                    var a = s.alpha + Math.sin(s.twinklePhase) * 0.2;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 255, 255, " + Math.max(0, a) + ")";
                    ctx.fill();
                }

                // Floating tech words - repulsion pass first
                for (var fw = 0; fw < floatingWords.length; fw++) {
                    var word = floatingWords[fw];
                    for (var fw2 = fw + 1; fw2 < floatingWords.length; fw2++) {
                        var other = floatingWords[fw2];
                        var ddx = word.x - other.x;
                        var ddy = word.y - other.y;
                        var dist = Math.sqrt(ddx * ddx + ddy * ddy);
                        var minDist = (word.size + other.size) * 4;
                        if (dist < minDist && dist > 0) {
                            var force = (minDist - dist) / minDist * 0.02;
                            var nx = ddx / dist;
                            var ny = ddy / dist;
                            word.dx += nx * force;
                            word.dy += ny * force;
                            other.dx -= nx * force;
                            other.dy -= ny * force;
                        }
                    }
                    // Dampen speed to keep it slow
                    var speed = Math.sqrt(word.dx * word.dx + word.dy * word.dy);
                    if (speed > 0.12) {
                        word.dx *= 0.12 / speed;
                        word.dy *= 0.12 / speed;
                    }
                    word.x += word.dx;
                    word.y += word.dy;

                    if (word.x < -100) word.x = starsCanvas.width + 50;
                    if (word.x > starsCanvas.width + 100) word.x = -50;
                    if (word.x < -100) word.x = starsCanvas.width + 50;
                    if (word.x > starsCanvas.width + 100) word.x = -50;
                    if (word.y > starsCanvas.height + 30) word.y = 150;
                    // Hard boundary: keep words below name area
                    if (word.y < 130) {
                        word.y = 130;
                        word.dy = Math.abs(word.dy) * 0.5 + 0.02;
                    }

                    var targetAlpha = nameHovered ? 0.8 : 0.20;
                    var currentAlpha = parseFloat(word._currentAlpha || 0);
                    word._currentAlpha = currentAlpha + (targetAlpha - currentAlpha) * 0.08;

                    ctx.font = word.size + "px -apple-system, sans-serif";
                    ctx.fillStyle = "rgba(150, 180, 220, " + word._currentAlpha + ")";
                    ctx.fillText(word.text, word.x, word.y);
                }

                // Shooting stars
                for (var m = shootingStars.length - 1; m >= 0; m--) {
                    var ss = shootingStars[m];
                    ss.x += Math.cos(ss.angle) * ss.speed;
                    ss.y += Math.sin(ss.angle) * ss.speed;
                    ss.alpha -= ss.decay;

                    if (ss.alpha <= 0) {
                        shootingStars.splice(m, 1);
                        continue;
                    }

                    var tailX = ss.x - Math.cos(ss.angle) * ss.len;
                    var tailY = ss.y - Math.sin(ss.angle) * ss.len;

                    var grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
                    grad.addColorStop(0, "rgba(255, 255, 255, 0)");
                    grad.addColorStop(1, "rgba(255, 255, 255, " + ss.alpha + ")");

                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(ss.x, ss.y);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                // Spaceships
                for (var k = 0; k < ships.length; k++) {
                    var sh = ships[k];
                    sh.angle += sh.turnSpeed;
                    sh.x += Math.cos(sh.angle) * sh.speed;
                    sh.y += Math.sin(sh.angle) * sh.speed;

                    // Wrap around
                    if (sh.x < -50) sh.x = starsCanvas.width + 50;
                    if (sh.x > starsCanvas.width + 50) sh.x = -50;
                    if (sh.y < -50) sh.y = starsCanvas.height + 50;
                    if (sh.y > starsCanvas.height + 50) sh.y = -50;

                    // Store trail
                    sh.trail.push({ x: sh.x, y: sh.y });
                    if (sh.trail.length > 30) sh.trail.shift();

                    // Draw trail
                    for (var t = 0; t < sh.trail.length; t++) {
                        var tp = sh.trail[t];
                        var ta = (t / sh.trail.length) * 0.3;
                        var tr = (t / sh.trail.length) * sh.size * 0.5;
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, tr, 0, Math.PI * 2);
                        ctx.fillStyle = "rgba(180, 200, 255, " + ta + ")";
                        ctx.fill();
                    }

                    // Draw ship (small bright dot)
                    ctx.beginPath();
                    ctx.arc(sh.x, sh.y, sh.size, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(200, 220, 255, 0.8)";
                    ctx.fill();
                }

                // Constellation stars and lines (from chat)
                if (window._constellation && window._constellation.stars.length > 0) {
                    var con = window._constellation;
                    var now = Date.now();

                    // Draw lines first (behind stars)
                    for (var li = 0; li < con.lines.length; li++) {
                        var line = con.lines[li];
                        ctx.beginPath();
                        ctx.moveTo(line.x1, line.y1);
                        ctx.lineTo(line.x2, line.y2);
                        ctx.strokeStyle = "rgba(192, 57, 43, " + (line.alpha || 0.3) + ")";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    // Draw constellation stars
                    for (var ci = 0; ci < con.stars.length; ci++) {
                        var cs = con.stars[ci];
                        var pulse = cs.pulse ? (Math.sin(now * 0.003 + cs.phase) * 0.15 + 0.85) : 1;
                        var cr = cs.r * pulse;

                        // Outer glow
                        ctx.beginPath();
                        ctx.arc(cs.x, cs.y, cr * 3, 0, Math.PI * 2);
                        ctx.fillStyle = "rgba(192, 57, 43, " + (cs.alpha * 0.15) + ")";
                        ctx.fill();

                        // Core star
                        ctx.beginPath();
                        ctx.arc(cs.x, cs.y, cr, 0, Math.PI * 2);
                        ctx.fillStyle = cs.color || ("rgba(255, 255, 255, " + cs.alpha + ")");
                        ctx.fill();
                    }

                    // Constellation name label
                    if (con.name && con.stars.length > 0) {
                        var ncx = 0, ncy = 0;
                        for (var ni = 0; ni < con.stars.length; ni++) {
                            ncx += con.stars[ni].x;
                            ncy += con.stars[ni].y;
                        }
                        ncx /= con.stars.length;
                        ncy /= con.stars.length;
                        ctx.font = "14px -apple-system, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillStyle = "rgba(192, 57, 43, " + (0.4 + Math.sin(now * 0.002) * 0.2) + ")";
                        ctx.fillText(con.name, ncx, ncy - 25);
                        ctx.textAlign = "start";
                    }
                }
            }
            requestAnimationFrame(drawStars);
        })();

        // ---- Globe ----
        var _globePhi = 0;
        var _globeReady = false;

        var canvas = document.getElementById("globe");
        var markerHit = document.getElementById("marker-hit");
        var wrapper = document.querySelector(".globe-wrapper");
        var phi = 0;
        var pointerDown = false;
        var pointerX = 0;
        var pointerStartX = 0;
        var velocityX = 0;

        createGlobe(canvas, {
            devicePixelRatio: 2,
            width: 2400,
            height: 2400,
            phi: 0,
            theta: 0.3,
            dark: 1,
            diffuse: 1.2,
            mapSamples: 20000,
            mapBrightness: 6,
            baseColor: [0.3, 0.3, 0.3],
            markerColor: [0.75, 0.22, 0.17],
            glowColor: [0.08, 0.08, 0.08],
            markers: [
                { location: [49.28, -123.12], size: 0.1 }
            ],
            onRender: function (state) {
                if (!pointerDown) {
                    phi += 0.003;
                }
                phi += velocityX;
                velocityX *= 0.95;
                state.phi = phi;
                _globePhi = phi;
                _globeReady = true;
            }
        });

        // ---- Marker overlay projection ----
        var latRad = 49.28 * Math.PI / 180;
        var lngAdj = -123.12 * Math.PI / 180 - Math.PI;
        var mx = -Math.cos(latRad) * Math.cos(lngAdj);
        var my = Math.sin(latRad);
        var mz = Math.cos(latRad) * Math.sin(lngAdj);
        var theta = 0.3;

        function positionMarker() {
            requestAnimationFrame(positionMarker);
            if (!_globeReady) return;

            var p = _globePhi;
            var cp = Math.cos(p), sp = Math.sin(p);
            var ct = Math.cos(theta), st = Math.sin(theta);

            var camX = cp * mx + sp * mz;
            var camY = sp * st * mx + ct * my - cp * st * mz;
            var camZ = -sp * ct * mx + st * my + cp * ct * mz;

            if (camZ > 0.05) {
                var w = canvas.clientWidth;
                var sx = w * (camX * 0.8 + 1) / 2;
                var sy = w * (1 - camY * 0.8) / 2;
                markerHit.style.display = "block";
                markerHit.style.left = sx + "px";
                markerHit.style.top = sy + "px";
            } else {
                markerHit.style.display = "none";
            }
        }
        requestAnimationFrame(positionMarker);

        // Teleport element
        var teleportEl = document.getElementById("teleport");

        // Reset on back navigation
        window.addEventListener("pageshow", function () {
            teleportEl.classList.remove("active");
            teleportEl.removeAttribute("style");
        });

        // Teleport function (called from chat UI link or when chat overrides)
        window._doTeleport = function () {
            var rect = markerHit.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;

            var maxDist = Math.max(
                Math.hypot(cx, cy),
                Math.hypot(window.innerWidth - cx, cy),
                Math.hypot(cx, window.innerHeight - cy),
                Math.hypot(window.innerWidth - cx, window.innerHeight - cy)
            );
            var size = maxDist * 2.2;

            teleportEl.classList.remove("active");
            teleportEl.removeAttribute("style");
            teleportEl.offsetHeight;

            teleportEl.style.left = cx + "px";
            teleportEl.style.top = cy + "px";
            teleportEl.style.width = size + "px";
            teleportEl.style.height = size + "px";
            teleportEl.offsetHeight;
            teleportEl.classList.add("active");

            setTimeout(function () {
                window.location.href = "https://www.uniqueaccommodations.com";
            }, 750);
        };

        markerHit.addEventListener("click", function (e) {
            e.stopPropagation();
            // If chat module loaded, open chat instead of teleport
            if (window._openChat) {
                window._openChat();
                return;
            }
            window._doTeleport();
        });

        // Drag interaction
        wrapper.addEventListener("pointerdown", function (e) {
            if (e.target === markerHit) return;
            pointerDown = true;
            pointerX = e.clientX;
            pointerStartX = e.clientX;
            wrapper.style.cursor = "grabbing";
        });

        window.addEventListener("pointerup", function () {
            pointerDown = false;
            wrapper.style.cursor = "grab";
        });

        window.addEventListener("pointermove", function (e) {
            if (pointerDown) {
                var dx = e.clientX - pointerX;
                pointerX = e.clientX;
                velocityX = dx / 200;
            }
        });

        canvas.addEventListener("touchstart", function (e) {
            if (e.touches.length === 1) {
                pointerDown = true;
                pointerX = e.touches[0].clientX;
                pointerStartX = e.touches[0].clientX;
            }
        }, { passive: true });

        window.addEventListener("touchend", function () {
            pointerDown = false;
        });

        window.addEventListener("touchmove", function (e) {
            if (pointerDown && e.touches.length === 1) {
                var dx = e.touches[0].clientX - pointerX;
                pointerX = e.touches[0].clientX;
                velocityX = dx / 200;
            }
        }, { passive: true });
    </script>

    <!-- Constellation Chat -->
    <script>
    (function () {
        var API_BASE = "https://www.uniqueaccommodations.com";
        var chatOpen = false;
        var chatHistory = [];
        var constellationName = null;
        var ttsEnabled = true;
        var language = "en";
        var isLoading = false;
        var contactCaptured = false;
        var messageIndex = 0;

        // Constellation state (read by star canvas renderer)
        window._constellation = { stars: [], lines: [], name: null };

        // Voice map
        var voices = {
            en: "en-US-JennyNeural",
            fr: "fr-CA-SylvieNeural",
            zh: "zh-CN-XiaoxiaoNeural",
            ko: "ko-KR-SunHiNeural",
            ja: "ja-JP-NanamiNeural",
            es: "es-MX-DaliaNeural",
            pt: "pt-BR-FranciscaNeural",
            de: "de-DE-KatjaNeural"
        };

        // Elements
        var chatContainer = document.getElementById("chat-container");
        var chatMessages = document.getElementById("chat-messages");
        var chatInput = document.getElementById("chat-input");
        var sendBtn = document.getElementById("chat-send");
        var closeBtn = document.getElementById("chat-close");
        var ttsToggle = document.getElementById("tts-toggle");
        var langSelect = document.getElementById("chat-lang");
        var starsCanvas = document.getElementById("stars");

        // Expose open function for marker-hit
        window._openChat = function () {
            if (chatOpen) {
                closeChat();
                return;
            }
            chatOpen = true;
            chatContainer.classList.add("open");
            document.body.classList.add("chat-mode");
            chatInput.focus();

            if (chatHistory.length === 0) {
                addMessage("assistant", "Hey! I'm Mark's AI. Ask me anything about my work with AI, property management tech, or just say hi.");
            }
        };

        function closeChat() {
            chatOpen = false;
            chatContainer.classList.remove("open");
            document.body.classList.remove("chat-mode");
        }

        function addMessage(role, text) {
            var div = document.createElement("div");
            div.className = "chat-msg " + (role === "user" ? "chat-msg-user" : "chat-msg-ai");
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Place constellation stars on the background canvas
        function addConstellationStar(role) {
            var c = window._constellation;
            var w = starsCanvas.width;
            var h = starsCanvas.height;

            // Spiral outward from center-top
            var angle = messageIndex * 0.9 + Math.PI;
            var radius = 40 + messageIndex * 20;
            var centerX = w * 0.5;
            var centerY = h * 0.3;

            if (role === "user") {
                c.stars.push({
                    x: centerX + Math.cos(angle) * radius + (Math.random() - 0.5) * 20,
                    y: centerY + Math.sin(angle) * radius + (Math.random() - 0.5) * 20,
                    r: 2.5,
                    alpha: 0.9,
                    pulse: true,
                    phase: Math.random() * Math.PI * 2,
                    color: "rgba(255, 255, 255, 0.9)"
                });
            } else {
                // AI response: 2-4 connected stars
                var count = Math.floor(Math.random() * 3) + 2;
                var baseX = centerX + Math.cos(angle) * radius;
                var baseY = centerY + Math.sin(angle) * radius;
                var newStars = [];

                for (var i = 0; i < count; i++) {
                    var star = {
                        x: baseX + (Math.random() - 0.5) * 50,
                        y: baseY + (Math.random() - 0.5) * 50,
                        r: 2,
                        alpha: 0.8,
                        pulse: true,
                        phase: Math.random() * Math.PI * 2,
                        color: "rgba(255, 220, 220, 0.85)"
                    };
                    c.stars.push(star);
                    newStars.push(star);
                }

                // Connect AI stars with red lines
                for (var j = 0; j < newStars.length - 1; j++) {
                    c.lines.push({
                        x1: newStars[j].x, y1: newStars[j].y,
                        x2: newStars[j + 1].x, y2: newStars[j + 1].y,
                        alpha: 0.3
                    });
                }

                // Connect to previous user star
                if (c.stars.length > count + 1) {
                    var prev = c.stars[c.stars.length - count - 1];
                    c.lines.push({
                        x1: newStars[0].x, y1: newStars[0].y,
                        x2: prev.x, y2: prev.y,
                        alpha: 0.2
                    });
                }
            }
            messageIndex++;
        }

        function sendMessage() {
            if (isLoading) return;
            var text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = "";
            addMessage("user", text);
            addConstellationStar("user");

            isLoading = true;
            sendBtn.disabled = true;

            // Typing indicator
            var typing = document.createElement("div");
            typing.className = "chat-msg chat-msg-ai chat-typing";
            typing.textContent = "...";
            chatMessages.appendChild(typing);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            fetch(API_BASE + "/api/mark-chat.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: text,
                    history: chatHistory,
                    language: language
                })
            })
            .then(function (r) {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.json();
            })
            .then(function (data) {
                if (typing.parentNode) typing.parentNode.removeChild(typing);

                if (data.error) {
                    addMessage("assistant", data.error);
                    return;
                }

                var response = data.response;
                addMessage("assistant", response);
                addConstellationStar("assistant");

                // Store raw JSON as assistant content so Claude sees its format
                chatHistory.push({ role: "user", content: text });
                chatHistory.push({ role: "assistant", content: response });

                // Constellation name
                if (data.constellation_name && !constellationName) {
                    constellationName = data.constellation_name;
                    window._constellation.name = constellationName;
                }

                // Contact captured
                if (data.contact_captured && !contactCaptured) {
                    contactCaptured = true;
                    transmissionAnimation();
                }

                // TTS
                if (ttsEnabled && response) {
                    playTTS(response);
                }
            })
            .catch(function () {
                if (typing.parentNode) typing.parentNode.removeChild(typing);
                addMessage("assistant", "Connection error. Please try again.");
            })
            .finally(function () {
                isLoading = false;
                sendBtn.disabled = false;
            });
        }

        function playTTS(text) {
            var voice = voices[language] || "en-US-JennyNeural";
            fetch(API_BASE + "/api/tts.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text.substring(0, 500), voice: voice })
            })
            .then(function (r) {
                if (!r.ok) throw new Error("TTS failed");
                return r.blob();
            })
            .then(function (blob) {
                var audio = new Audio(URL.createObjectURL(blob));
                audio.play().catch(function () {});
            })
            .catch(function () {}); // silent fail for TTS
        }

        function transmissionAnimation() {
            var overlay = document.createElement("div");
            overlay.id = "transmission-overlay";
            overlay.innerHTML = '<div class="transmission-text">TRANSMISSION COMPLETE</div>' +
                '<div class="transmission-sub">Message sent to Vancouver</div>';
            document.body.appendChild(overlay);

            // Pulse all constellation stars
            var c = window._constellation;
            for (var i = 0; i < c.stars.length; i++) {
                c.stars[i].pulse = true;
                c.stars[i].r = 3;
            }

            setTimeout(function () {
                overlay.classList.add("fade-out");
                setTimeout(function () {
                    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                }, 1000);
            }, 3000);
        }

        // Event listeners
        closeBtn.addEventListener("click", closeChat);
        sendBtn.addEventListener("click", sendMessage);

        chatInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        ttsToggle.addEventListener("click", function () {
            ttsEnabled = !ttsEnabled;
            this.classList.toggle("muted", !ttsEnabled);
            this.innerHTML = ttsEnabled ? "&#x1F50A;" : "&#x1F507;";
        });

        langSelect.addEventListener("change", function () {
            language = this.value;
        });

        // UAC link in header triggers teleport animation
        var uacLink = document.querySelector(".chat-uac-link");
        if (uacLink) {
            uacLink.addEventListener("click", function (e) {
                e.preventDefault();
                closeChat();
                if (window._doTeleport) {
                    window._doTeleport();
                } else {
                    window.location.href = this.href;
                }
            });
        }
    })();
    </script>
</body>
