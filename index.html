    <script>
        // ---- Constellation data (global, shared between starfield renderer and chat module) ----
        var cStars = [];      // {x, y, r, alpha, targetAlpha, pulse, type}
        var cLines = [];      // {fromIdx, toIdx, alpha, targetAlpha}
        var cParticles = [];  // {x, y, tx, ty, progress}
        var cName = null;
        var cNameAlpha = 0;
        var cCenter = null;
        var cAngle = 0;
        var cRadius = 30;

        // ---- Star particles ----
        (function () {
            var starsCanvas = document.getElementById("stars");
            var ctx = starsCanvas.getContext("2d");
            var stars = [];
            var numStars = 120;

            function resize() {
                starsCanvas.width = window.innerWidth;
                starsCanvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            for (var i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    dx: (Math.random() - 0.5) * 0.15,
                    dy: (Math.random() - 0.5) * 0.1,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }

            // Floating tech words
            var techWords = [
                "Claude", "OpenAI", "GPT-4", "GPT-5", "ChatGPT", "Anthropic",
                "Gemini", "Llama 3", "Mistral", "Ollama", "Copilot", "Perplexity",

                "LLM", "RAG", "Embeddings", "NLP", "Machine Learning",
                "Neural Networks", "Deep Learning", "Transformers", "BERT",
                "Fine-Tuning", "LoRA", "Inference", "Tokenizer", "Attention",
                "Prompt Engineering", "AI Agents", "Multi-Modal", "Diffusion",
                "Reinforcement Learning", "Computer Vision", "Semantic Search",
                "Vector DB", "Knowledge Graph", "Edge AI", "MLOps",
                "Generative AI", "Foundation Models", "Chain of Thought",
                "Langchain", "LlamaIndex", "Hugging Face", "TensorFlow",
                "PyTorch", "Keras", "scikit-learn", "Pandas", "NumPy",
                "Python", "JavaScript", "TypeScript", "Node.js", "VBA", "SQL",
                "Next.js", "React", "Supabase", "PostgreSQL", "Flask",
                "Vercel", "Tailwind", "WebGL", "GraphQL", "REST API",
                "WebSockets", "OAuth", "Redis", "MongoDB",
                "AWS", "Azure", "Docker", "Kubernetes", "CI/CD", "GitHub",
                "Twilio", "Graph API", "OCR", "Tesseract", "PaddleOCR",
                "SMTP", "Cron Jobs", "Data Pipeline", "API", "Automation",
                "MCP", "Tool Use", "Agentic AI", "Claude Code",
                "Cursor", "Windsurf", "v0", "Bolt", "Lovable",
                "OpenRouter", "Groq", "Cerebras", "Local LLM",
                "Context Window", "System Prompt", "Function Calling",
                "Structured Output", "Streaming", "Batch API",
                "AI Safety", "Alignment", "RLHF", "DPO",
                "Retrieval", "Chunking", "Reranking", "Hybrid Search"
            ];
            var floatingWords = [];
            var isMobile = window.innerWidth < 640;
            var wordCount = isMobile ? Math.min(30, techWords.length) : techWords.length;
            if (isMobile) techWords.sort(function () { return Math.random() - 0.5; });
            for (var w = 0; w < wordCount; w++) {
                floatingWords.push({
                    text: techWords[w],
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * (starsCanvas.height - 150) + 150,
                    dx: (Math.random() - 0.5) * 0.06,
                    dy: (Math.random() - 0.5) * 0.06,
                    alpha: 0.20,
                    size: isMobile ? Math.random() * 3 + 8 : Math.random() * 4 + 10
                });
            }
            var nameHovered = false;
            var wasHovered = false;
            var headerArea = document.querySelector(".container");
            document.querySelector("h1").addEventListener("click", function () {
                nameHovered = !nameHovered;
                if (nameHovered) {
                    for (var r = 0; r < floatingWords.length; r++) {
                        floatingWords[r].x = Math.random() * starsCanvas.width;
                        floatingWords[r].y = Math.random() * (starsCanvas.height - 150) + 150;
                        floatingWords[r]._currentAlpha = 0;
                    }
                }
            });
            headerArea.addEventListener("mouseover", function (e) {
                var rect = headerArea.getBoundingClientRect();
                if (e.clientY < rect.top + 110) nameHovered = true;
            });
            headerArea.addEventListener("mouseout", function () { nameHovered = false; });
            headerArea.addEventListener("mousemove", function (e) {
                var rect = headerArea.getBoundingClientRect();
                nameHovered = e.clientY < rect.top + 110;
                if (nameHovered && !wasHovered) {
                    for (var r = 0; r < floatingWords.length; r++) {
                        floatingWords[r].x = Math.random() * starsCanvas.width;
                        floatingWords[r].y = Math.random() * (starsCanvas.height - 150) + 150;
                        floatingWords[r]._currentAlpha = 0;
                    }
                }
                wasHovered = nameHovered;
            });

            // Shooting stars
            var shootingStars = [];
            function spawnShootingStar() {
                shootingStars.push({
                    x: Math.random() * starsCanvas.width * 0.8,
                    y: Math.random() * starsCanvas.height * 0.4,
                    len: Math.random() * 80 + 40,
                    speed: Math.random() * 8 + 6,
                    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.01
                });
                setTimeout(spawnShootingStar, Math.random() * 6000 + 3000);
            }
            setTimeout(spawnShootingStar, 2000);

            // Spaceships
            var ships = [];
            for (var j = 0; j < 3; j++) {
                ships.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height * 0.6,
                    angle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.4 + 0.3,
                    turnSpeed: (Math.random() - 0.5) * 0.005,
                    size: Math.random() * 2 + 2,
                    trail: []
                });
            }

            function drawStars() {
                requestAnimationFrame(drawStars);
                ctx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);

                // Background stars
                for (var i = 0; i < stars.length; i++) {
                    var s = stars[i];
                    s.x += s.dx;
                    s.y += s.dy;
                    s.twinklePhase += s.twinkleSpeed;

                    if (s.x < 0) s.x = starsCanvas.width;
                    if (s.x > starsCanvas.width) s.x = 0;
                    if (s.y < 0) s.y = starsCanvas.height;
                    if (s.y > starsCanvas.height) s.y = 0;

                    var a = s.alpha + Math.sin(s.twinklePhase) * 0.2;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 255, 255, " + Math.max(0, a) + ")";
                    ctx.fill();
                }

                // Floating tech words
                for (var fw = 0; fw < floatingWords.length; fw++) {
                    var word = floatingWords[fw];
                    for (var fw2 = fw + 1; fw2 < floatingWords.length; fw2++) {
                        var other = floatingWords[fw2];
                        var ddx = word.x - other.x;
                        var ddy = word.y - other.y;
                        var dist = Math.sqrt(ddx * ddx + ddy * ddy);
                        var minDist = (word.size + other.size) * 4;
                        if (dist < minDist && dist > 0) {
                            var force = (minDist - dist) / minDist * 0.02;
                            var nx = ddx / dist;
                            var ny = ddy / dist;
                            word.dx += nx * force;
                            word.dy += ny * force;
                            other.dx -= nx * force;
                            other.dy -= ny * force;
                        }
                    }
                    var speed = Math.sqrt(word.dx * word.dx + word.dy * word.dy);
                    if (speed > 0.12) {
                        word.dx *= 0.12 / speed;
                        word.dy *= 0.12 / speed;
                    }
                    word.x += word.dx;
                    word.y += word.dy;

                    if (word.x < -100) word.x = starsCanvas.width + 50;
                    if (word.x > starsCanvas.width + 100) word.x = -50;
                    if (word.x < -100) word.x = starsCanvas.width + 50;
                    if (word.x > starsCanvas.width + 100) word.x = -50;
                    if (word.y > starsCanvas.height + 30) word.y = 150;
                    if (word.y < 130) {
                        word.y = 130;
                        word.dy = Math.abs(word.dy) * 0.5 + 0.02;
                    }

                    var targetAlpha = nameHovered ? 0.8 : 0.20;
                    var currentAlpha = parseFloat(word._currentAlpha || 0);
                    word._currentAlpha = currentAlpha + (targetAlpha - currentAlpha) * 0.08;

                    ctx.font = word.size + "px -apple-system, sans-serif";
                    ctx.fillStyle = "rgba(150, 180, 220, " + word._currentAlpha + ")";
                    ctx.fillText(word.text, word.x, word.y);
                }

                // Shooting stars
                for (var m = shootingStars.length - 1; m >= 0; m--) {
                    var ss = shootingStars[m];
                    ss.x += Math.cos(ss.angle) * ss.speed;
                    ss.y += Math.sin(ss.angle) * ss.speed;
                    ss.alpha -= ss.decay;

                    if (ss.alpha <= 0) {
                        shootingStars.splice(m, 1);
                        continue;
                    }

                    var tailX = ss.x - Math.cos(ss.angle) * ss.len;
                    var tailY = ss.y - Math.sin(ss.angle) * ss.len;

                    var grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
                    grad.addColorStop(0, "rgba(255, 255, 255, 0)");
                    grad.addColorStop(1, "rgba(255, 255, 255, " + ss.alpha + ")");

                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(ss.x, ss.y);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                // Spaceships
                for (var k = 0; k < ships.length; k++) {
                    var sh = ships[k];
                    sh.angle += sh.turnSpeed;
                    sh.x += Math.cos(sh.angle) * sh.speed;
                    sh.y += Math.sin(sh.angle) * sh.speed;

                    if (sh.x < -50) sh.x = starsCanvas.width + 50;
                    if (sh.x > starsCanvas.width + 50) sh.x = -50;
                    if (sh.y < -50) sh.y = starsCanvas.height + 50;
                    if (sh.y > starsCanvas.height + 50) sh.y = -50;

                    sh.trail.push({ x: sh.x, y: sh.y });
                    if (sh.trail.length > 30) sh.trail.shift();

                    for (var t = 0; t < sh.trail.length; t++) {
                        var tp = sh.trail[t];
                        var ta = (t / sh.trail.length) * 0.3;
                        var tr = (t / sh.trail.length) * sh.size * 0.5;
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, tr, 0, Math.PI * 2);
                        ctx.fillStyle = "rgba(180, 200, 255, " + ta + ")";
                        ctx.fill();
                    }

                    ctx.beginPath();
                    ctx.arc(sh.x, sh.y, sh.size, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(200, 220, 255, 0.8)";
                    ctx.fill();
                }

                // ---- Constellation rendering ----
                // Lines connecting constellation stars
                for (var cl = 0; cl < cLines.length; cl++) {
                    var line = cLines[cl];
                    line.alpha += (line.targetAlpha - line.alpha) * 0.04;
                    if (line.alpha < 0.005) continue;
                    var ls1 = cStars[line.fromIdx];
                    var ls2 = cStars[line.toIdx];
                    if (!ls1 || !ls2) continue;
                    ctx.beginPath();
                    ctx.moveTo(ls1.x, ls1.y);
                    ctx.lineTo(ls2.x, ls2.y);
                    ctx.strokeStyle = "rgba(192, 57, 43, " + line.alpha + ")";
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Constellation stars
                for (var cs = 0; cs < cStars.length; cs++) {
                    var cStar = cStars[cs];
                    cStar.alpha += (cStar.targetAlpha - cStar.alpha) * 0.04;

                    // Pulse effect for new stars
                    if (cStar.pulse > 0) {
                        cStar.pulse -= 0.015;
                        var pr = cStar.r + cStar.pulse * 10;
                        ctx.beginPath();
                        ctx.arc(cStar.x, cStar.y, pr, 0, Math.PI * 2);
                        ctx.fillStyle = "rgba(192, 57, 43, " + (cStar.pulse * 0.25) + ")";
                        ctx.fill();
                    }

                    // Outer glow
                    ctx.beginPath();
                    ctx.arc(cStar.x, cStar.y, cStar.r * 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 200, 180, " + (cStar.alpha * 0.08) + ")";
                    ctx.fill();

                    // Core
                    ctx.beginPath();
                    ctx.arc(cStar.x, cStar.y, cStar.r, 0, Math.PI * 2);
                    var coreColor = cStar.type === "user" ? "255, 255, 255" : "255, 220, 200";
                    ctx.fillStyle = "rgba(" + coreColor + ", " + cStar.alpha + ")";
                    ctx.fill();
                }

                // Message-to-star particles (shooting from chat to sky)
                for (var cp = cParticles.length - 1; cp >= 0; cp--) {
                    var particle = cParticles[cp];
                    particle.progress += 0.025;
                    if (particle.progress >= 1) {
                        cParticles.splice(cp, 1);
                        continue;
                    }
                    // Ease-out cubic
                    var et = 1 - Math.pow(1 - particle.progress, 3);
                    var px = particle.x + (particle.tx - particle.x) * et;
                    var py = particle.y + (particle.ty - particle.y) * et;
                    var pa = 1 - particle.progress;

                    // Particle head
                    ctx.beginPath();
                    ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 255, 255, " + pa + ")";
                    ctx.fill();

                    // Trail
                    for (var ptr = 1; ptr <= 4; ptr++) {
                        var tt = Math.max(0, particle.progress - ptr * 0.015);
                        var tEase = 1 - Math.pow(1 - tt, 3);
                        var tx = particle.x + (particle.tx - particle.x) * tEase;
                        var ty = particle.y + (particle.ty - particle.y) * tEase;
                        ctx.beginPath();
                        ctx.arc(tx, ty, 1.5 - ptr * 0.25, 0, Math.PI * 2);
                        ctx.fillStyle = "rgba(255, 200, 180, " + (pa * (1 - ptr / 5) * 0.4) + ")";
                        ctx.fill();
                    }
                }

                // Constellation name label
                if (cName) {
                    if (cNameAlpha < 1) cNameAlpha += 0.008;
                    if (cCenter) {
                        ctx.save();
                        ctx.font = "600 14px -apple-system, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillStyle = "rgba(192, 57, 43, " + cNameAlpha + ")";
                        ctx.shadowColor = "rgba(192, 57, 43, 0.4)";
                        ctx.shadowBlur = 12;
                        ctx.fillText(cName, cCenter.x, cCenter.y - 20);
                        ctx.restore();
                    }
                }
            }
            requestAnimationFrame(drawStars);
        })();

        // ---- Globe ----
        var _globePhi = 0;
        var _globeReady = false;

        var canvas = document.getElementById("globe");
        var markerHit = document.getElementById("marker-hit");
        var wrapper = document.querySelector(".globe-wrapper");
        var phi = 0;
        var pointerDown = false;
        var pointerX = 0;
        var pointerStartX = 0;
        var velocityX = 0;

        createGlobe(canvas, {
            devicePixelRatio: 2,
            width: 2400,
            height: 2400,
            phi: 0,
            theta: 0.3,
            dark: 1,
            diffuse: 1.2,
            mapSamples: 20000,
            mapBrightness: 6,
            baseColor: [0.3, 0.3, 0.3],
            markerColor: [0.75, 0.22, 0.17],
            glowColor: [0.08, 0.08, 0.08],
            markers: [
                { location: [49.28, -123.12], size: 0.1 }
            ],
            onRender: function (state) {
                if (!pointerDown) {
                    phi += 0.003;
                }
                phi += velocityX;
                velocityX *= 0.95;
                state.phi = phi;
                _globePhi = phi;
                _globeReady = true;
            }
        });

        // ---- Marker overlay projection ----
        var latRad = 49.28 * Math.PI / 180;
        var lngAdj = -123.12 * Math.PI / 180 - Math.PI;
        var mx = -Math.cos(latRad) * Math.cos(lngAdj);
        var my = Math.sin(latRad);
        var mz = Math.cos(latRad) * Math.sin(lngAdj);
        var theta = 0.3;

        function positionMarker() {
            requestAnimationFrame(positionMarker);
            if (!_globeReady) return;

            var p = _globePhi;
            var cp = Math.cos(p), sp = Math.sin(p);
            var ct = Math.cos(theta), st = Math.sin(theta);

            var camX = cp * mx + sp * mz;
            var camY = sp * st * mx + ct * my - cp * st * mz;
            var camZ = -sp * ct * mx + st * my + cp * ct * mz;

            if (camZ > 0.05) {
                var w = canvas.clientWidth;
                var sx = w * (camX * 0.8 + 1) / 2;
                var sy = w * (1 - camY * 0.8) / 2;
                markerHit.style.display = "block";
                markerHit.style.left = sx + "px";
                markerHit.style.top = sy + "px";
            } else {
                markerHit.style.display = "none";
            }
        }
        requestAnimationFrame(positionMarker);

        // Teleport element and function
        var teleportEl = document.getElementById("teleport");

        window.addEventListener("pageshow", function () {
            teleportEl.classList.remove("active");
            teleportEl.removeAttribute("style");
        });

        function doTeleport() {
            var rect = markerHit.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;

            var maxDist = Math.max(
                Math.hypot(cx, cy),
                Math.hypot(window.innerWidth - cx, cy),
                Math.hypot(cx, window.innerHeight - cy),
                Math.hypot(window.innerWidth - cx, window.innerHeight - cy)
            );
            var size = maxDist * 2.2;

            teleportEl.classList.remove("active");
            teleportEl.removeAttribute("style");
            teleportEl.offsetHeight;

            teleportEl.style.left = cx + "px";
            teleportEl.style.top = cy + "px";
            teleportEl.style.width = size + "px";
            teleportEl.style.height = size + "px";
            teleportEl.offsetHeight;
            teleportEl.classList.add("active");

            setTimeout(function () {
                window.location.href = "https://www.uniqueaccommodations.com";
            }, 750);
        }

        // Marker click -> always teleport to uniqueaccommodations.com
        markerHit.addEventListener("click", function (e) {
            e.stopPropagation();
            doTeleport();
        });

        // Drag interaction
        wrapper.addEventListener("pointerdown", function (e) {
            if (e.target === markerHit) return;
            pointerDown = true;
            pointerX = e.clientX;
            pointerStartX = e.clientX;
            wrapper.style.cursor = "grabbing";
        });

        window.addEventListener("pointerup", function () {
            pointerDown = false;
            wrapper.style.cursor = "grab";
        });

        window.addEventListener("pointermove", function (e) {
            if (pointerDown) {
                var dx = e.clientX - pointerX;
                pointerX = e.clientX;
                velocityX = dx / 200;
            }
        });

        canvas.addEventListener("touchstart", function (e) {
            if (e.touches.length === 1) {
                pointerDown = true;
                pointerX = e.touches[0].clientX;
                pointerStartX = e.touches[0].clientX;
            }
        }, { passive: true });

        window.addEventListener("touchend", function () {
            pointerDown = false;
        });

        window.addEventListener("touchmove", function (e) {
            if (pointerDown && e.touches.length === 1) {
                var dx = e.touches[0].clientX - pointerX;
                pointerX = e.touches[0].clientX;
                velocityX = dx / 200;
            }
        }, { passive: true });

        // ---- Constellation Chat ----
        (function () {
            // HawkHost staging until DNS migrates production domain
            var API_BASE = "https://staging.uniqueaccommodations.com";
            var chatContainer = document.getElementById("chat-container");
            var chatMessages = document.getElementById("chat-messages");
            var chatInput = document.getElementById("chat-input");
            var chatSend = document.getElementById("chat-send");
            var chatClose = document.getElementById("chat-close");
            var chatLang = document.getElementById("chat-lang");
            var ttsToggle = document.getElementById("tts-toggle");
            var chatFab = document.getElementById("chat-fab");
            var transmissionOverlay = document.getElementById("transmission-overlay");
            var starsCanvas = document.getElementById("stars");

            var history = [];
            var ttsEnabled = true;
            var isOpen = false;
            var isSending = false;
            var contactCaptured = false;
            var constellationNamed = false;

            var GOLDEN_ANGLE = 2.39996;

            var voiceMap = {
                "en": "en-CA-LiamNeural",
                "fr": "fr-CA-SylvieNeural",
                "zh": "zh-CN-XiaoxiaoNeural",
                "ko": "ko-KR-SunHiNeural",
                "ja": "ja-JP-NanamiNeural",
                "es": "es-MX-DaliaNeural",
                "pt": "pt-BR-FranciscaNeural",
                "hi": "hi-IN-SwaraNeural"
            };

            function initCenter() {
                if (!cCenter) {
                    var mob = window.innerWidth < 640;
                    cCenter = {
                        x: starsCanvas.width * (mob ? 0.5 : 0.22 + Math.random() * 0.15),
                        y: starsCanvas.height * (0.12 + Math.random() * 0.1)
                    };
                    cAngle = Math.random() * Math.PI * 2;
                    cRadius = 25;
                }
            }

            function nextPos() {
                initCenter();
                cAngle += GOLDEN_ANGLE + (Math.random() - 0.5) * 0.4;
                cRadius += 14 + Math.random() * 10;
                var x = cCenter.x + Math.cos(cAngle) * cRadius;
                var y = cCenter.y + Math.sin(cAngle) * cRadius;
                // Keep in bounds - upper sky area
                x = Math.max(30, Math.min(starsCanvas.width - 30, x));
                y = Math.max(50, Math.min(starsCanvas.height * 0.45, y));
                return { x: x, y: y };
            }

            function addUserStar(text) {
                var pos = nextPos();
                cStars.push({
                    x: pos.x, y: pos.y, r: 3, alpha: 0, targetAlpha: 0.9,
                    pulse: 1.2, type: "user"
                });
                // Launch particle from bottom-right (chat area) to star position
                var mob = window.innerWidth < 640;
                cParticles.push({
                    x: mob ? starsCanvas.width * 0.5 : starsCanvas.width * 0.8,
                    y: starsCanvas.height * 0.85,
                    tx: pos.x, ty: pos.y,
                    progress: 0
                });
            }

            function addAIStars(text) {
                var count = 2 + Math.floor(Math.random() * 3); // 2-4 stars
                for (var i = 0; i < count; i++) {
                    var pos = nextPos();
                    cStars.push({
                        x: pos.x, y: pos.y, r: 2.5, alpha: 0, targetAlpha: 0.85,
                        pulse: 0.8, type: "ai"
                    });
                    // Connect to previous star
                    if (cStars.length > 1) {
                        cLines.push({
                            fromIdx: cStars.length - 2,
                            toIdx: cStars.length - 1,
                            alpha: 0,
                            targetAlpha: 0.25 + Math.random() * 0.1
                        });
                    }
                }
            }

            function toggleChat() {
                isOpen = !isOpen;
                if (isOpen) {
                    chatContainer.classList.remove("chat-hidden");
                    chatContainer.classList.add("chat-visible");
                    chatFab.classList.add("chat-open");
                    if (history.length === 0) {
                        addBotMessage("Hello! I'm Mark's AI. Ask me anything about my work with AI, property management, or just say hi.");
                        addAIStars("greeting");
                    }
                    setTimeout(function () { chatInput.focus(); }, 100);
                } else {
                    chatContainer.classList.remove("chat-visible");
                    chatContainer.classList.add("chat-hidden");
                    chatFab.classList.remove("chat-open");
                }
            }

            function addBotMessage(text) {
                var div = document.createElement("div");
                div.className = "chat-msg bot";
                div.textContent = text;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function addUserMessage(text) {
                var div = document.createElement("div");
                div.className = "chat-msg user";
                div.textContent = text;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function addLoading() {
                var div = document.createElement("div");
                div.className = "chat-msg bot loading";
                div.id = "chat-loading";
                div.innerHTML = '<span class="dot-pulse"><span></span><span></span><span></span></span>';
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeLoading() {
                var el = document.getElementById("chat-loading");
                if (el) el.remove();
            }

            function updateSendButton() {
                chatSend.disabled = isSending || chatInput.value.trim().length === 0;
            }

            chatInput.addEventListener("input", updateSendButton);

            async function sendMessage() {
                var text = chatInput.value.trim();
                if (!text || isSending) return;

                isSending = true;
                chatInput.value = "";
                updateSendButton();

                addUserMessage(text);
                addUserStar(text);
                addLoading();

                var lang = chatLang.value;

                try {
                    var resp = await fetch(API_BASE + "/api/mark-chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: text,
                            history: history,
                            language: lang
                        })
                    });

                    removeLoading();

                    if (!resp.ok) {
                        var errData = {};
                        try { errData = await resp.json(); } catch (e) {}
                        addBotMessage(errData.error || "Something went wrong. Try again.");
                        isSending = false;
                        updateSendButton();
                        return;
                    }

                    var data = await resp.json();

                    // Update history with raw content for Claude context
                    history.push({ role: "user", content: text });
                    history.push({ role: "assistant", content: JSON.stringify(data) });

                    // Display response
                    addBotMessage(data.response);
                    addAIStars(data.response);

                    // TTS
                    if (ttsEnabled && data.response) {
                        playTTS(data.response, lang);
                    }

                    // Constellation name
                    if (data.constellation_name && !constellationNamed) {
                        cName = data.constellation_name;
                        constellationNamed = true;
                    }

                    // Contact captured
                    if (data.contact_captured && !contactCaptured) {
                        contactCaptured = true;
                        showTransmission();
                    }

                } catch (err) {
                    removeLoading();
                    addBotMessage("Connection error. Please try again.");
                }

                isSending = false;
                updateSendButton();
                chatInput.focus();
            }

            async function playTTS(text, lang) {
                try {
                    var voice = voiceMap[lang] || "en-CA-LiamNeural";
                    var resp = await fetch(API_BASE + "/api/tts", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text: text, voice: voice })
                    });
                    if (resp.ok) {
                        var blob = await resp.blob();
                        var url = URL.createObjectURL(blob);
                        var audio = new Audio(url);
                        audio.addEventListener("ended", function () { URL.revokeObjectURL(url); });
                        audio.play().catch(function () {});
                    }
                } catch (e) {
                    // TTS is optional - fail silently
                }
            }

            function showTransmission() {
                // Pulse all constellation stars in sequence
                for (var i = 0; i < cStars.length; i++) {
                    (function (idx) {
                        setTimeout(function () {
                            if (cStars[idx]) cStars[idx].pulse = 1.5;
                        }, idx * 80);
                    })(i);
                }

                transmissionOverlay.classList.remove("hidden");
                transmissionOverlay.classList.add("visible");

                setTimeout(function () {
                    transmissionOverlay.classList.remove("visible");
                    transmissionOverlay.classList.add("hidden");
                }, 4000);
            }

            // Event listeners
            chatSend.addEventListener("click", sendMessage);
            chatInput.addEventListener("keydown", function (e) {
                if (e.key === "Enter" && !e.shiftKey) sendMessage();
            });
            chatClose.addEventListener("click", function () {
                if (isOpen) toggleChat();
            });
            chatFab.addEventListener("click", function () {
                if (!isOpen) toggleChat();
            });
            ttsToggle.addEventListener("click", function () {
                ttsEnabled = !ttsEnabled;
                ttsToggle.innerHTML = ttsEnabled ? "&#x1f50a;" : "&#x1f507;";
                ttsToggle.classList.toggle("muted", !ttsEnabled);
            });

            // Expose toggle for marker click
            window.toggleConstellationChat = toggleChat;
        })();
    </script>
</body>
